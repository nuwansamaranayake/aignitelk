services:
  aignitelk-web:
    build: .
    container_name: aignitelk-web
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aignitelk.rule=Host(`aignitelk.com`) || Host(`www.aignitelk.com`)"
      - "traefik.http.routers.aignitelk.entrypoints=websecure"
      - "traefik.http.routers.aignitelk.tls.certresolver=letsencrypt"
      - "traefik.http.services.aignitelk.loadbalancer.server.port=80"
      # Redirect www to non-www
      - "traefik.http.routers.aignitelk-www.rule=Host(`www.aignitelk.com`)"
      - "traefik.http.routers.aignitelk-www.entrypoints=websecure"
      - "traefik.http.routers.aignitelk-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.aignitelk-www.middlewares=aignitelk-www-redirect"
      - "traefik.http.middlewares.aignitelk-www-redirect.redirectregex.regex=^https://www\\.aignitelk\\.com/(.*)"
      - "traefik.http.middlewares.aignitelk-www-redirect.redirectregex.replacement=https://aignitelk.com/$${1}"
      - "traefik.http.middlewares.aignitelk-www-redirect.redirectregex.permanent=true"
    networks:
      - traefik

networks:
  traefik:
    external: true
